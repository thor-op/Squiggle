name: Bug Report
description: Something broke
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "## What went wrong?"
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: "1. Go to...\n2. Click...\n3. See error"
  - type: input
    id: browser
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 123, iPhone 15
